<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICS Builder</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <!-- Generated by Deepseek -->
    <main class="container">
      <h1>ICS 日历生成器</h1>
      <p>描述您的活动，一键生成日历邀请！</p>

      <form class="col" id="ics-form">
        <label for="api-url">API 接口地址：</label>
        <input id="api-url" type="url" placeholder="https://api.deepseek.com/v1/chat/completions" required />

        <label for="api-model">模型名称：</label>
        <input id="api-model" type="text" placeholder="deepseek-chat" required />

        <label for="api-key">API 密钥：</label>
        <input id="api-key" type="password" placeholder="sk-..." required />
        
        <label for="prompt">活动描述：</label>
        <textarea id="prompt" placeholder="例如：明天下午3点和小明开会，讨论产品需求，预计2小时..." rows="5" required></textarea>
        
        <button type="submit" id="submit-btn">生成并打开 ICS 文件</button>
      </form>
      <p id="status-msg"></p>
    </main>
  </body>
</html>

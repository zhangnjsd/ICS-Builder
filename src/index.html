<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICS Builder</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>ICS Builder</h1>
      <p>Describe your event and generate a calendar invite!</p>

      <form class="col" id="ics-form">
        <label for="api-url">LLM API Endpoint:</label>
        <input id="api-url" type="url" placeholder="https://api.deepseek.com/v1/chat/completions" required />

        <label for="api-model">Model Name:</label>
        <input id="api-model" type="text" placeholder="deepseek-chat" required />

        <label for="api-key">LLM API Key:</label>
        <input id="api-key" type="password" placeholder="sk-..." required />
        
        <label for="prompt">Event Description:</label>
        <textarea id="prompt" placeholder="E.g. I have a meeting with Alice tomorrow at 3 PM for 2 hours about project alpha..." rows="5" required></textarea>
        
        <button type="submit" id="submit-btn">Generate & Open ICS</button>
      </form>
      <p id="status-msg"></p>
    </main>
  </body>
</html>
